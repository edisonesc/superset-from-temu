name: Deploy to AWS ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: aws-env

    env:
      ECR_REPOSITORY: superset-from-temu
      ECS_CONTAINER_NAME: superset-from-temu-container
      ECS_SERVICE: temp-td-service
      ECS_CLUSTER: temp-cluster
      TASK_DEFINITION: temp-td

    steps:
      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Set dynamic Docker tag from commit SHA
      - name: Set Docker tag
        id: set-tag
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # Build Docker image and push to ECR
      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.tag }} .
          docker tag ${{ env.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.tag }} ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.tag }}
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.tag }}

      # Dynamically create ECS task definition
      - name: Render task definition dynamically
        id: task-definition-id
        run: |
          cat <<EOF > taskdef.json
          {
            "family": "${{ env.TASK_DEFINITION }}",
            "executionRoleArn": "arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "256",
            "memory": "1024",
            "containerDefinitions": [
              {
                "name": "${{ env.ECS_CONTAINER_NAME }}",
                "image": "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.tag }}",
                "essential": true,
                "portMappings": [
                  {
                    "containerPort": 3000,
                    "hostPort": 3000,
                    "protocol": "tcp"
                  }
                ],
                "environment": [
                  { "name": "NODE_ENV",       "value": "production" },
                  { "name": "AUTH_TRUST_HOST", "value": "true" },
                  { "name": "NEXTAUTH_URL",    "value": "${{ secrets.NEXTAUTH_URL }}" },
                  { "name": "DATABASE_URL",    "value": "${{ secrets.DATABASE_URL }}" },
                  { "name": "REDIS_URL",       "value": "${{ secrets.REDIS_URL }}" },
                  { "name": "NEXTAUTH_SECRET", "value": "${{ secrets.NEXTAUTH_SECRET }}" },
                  { "name": "ENCRYPTION_KEY",  "value": "${{ secrets.ENCRYPTION_KEY }}" },
                  { "name": "AWS_REGION",  "value": "${{ secrets.AWS_REGION }}" }
                ],
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": "/ecs/temp-td",
                    "awslogs-create-group": "true",
                    "awslogs-region": "${{ secrets.AWS_REGION }}",
                    "awslogs-stream-prefix": "ecs"
                  }
                }
              }
            ]
          }
          EOF

      - name: Print task definition for debugging
        run: cat taskdef.json

      # Deploy task definition to ECS
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: taskdef.json
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.tag }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
